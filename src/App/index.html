<div id='btn'></div>
<div id='view'>
    <header>
        调试工具
        <span id='close'>关闭</span>
    </header>
    <ul class='nav'>
        <li z-bind:active='activeTab==="console"?"yes":"no"' z-on:click='changeTab("console")'>
            Console
        </li>
        <li z-bind:active='activeTab==="network"?"yes":"no"' z-on:click='changeTab("network")'>
            Network
        </li>
        <li z-bind:active='activeTab==="memory"?"yes":"no"' z-on:click='changeTab("memory")'>
            Memory
        </li>
        <li z-bind:active='activeTab==="performance"?"yes":"no"' z-on:click='changeTab("performance")'>
            Performance
        </li>
    </ul>
    <div class="content">
        <div class="tab-content" data-tab="console" z-show='activeTab==="console"'>
            <ui-console></ui-console>
        </div>
        <div class="tab-content" data-tab="network" z-show='activeTab==="network"'>
            <ui-network></ui-network>
        </div>
        <div class="tab-content" data-tab="memory" z-show='activeTab==="memory"'>
            <ui-memory></ui-memory>
        </div>
        <div class="tab-content" data-tab="performance" z-show='activeTab==="performance"'>
            <ui-performance></ui-performance>
        </div>
    </div>
</div>
